<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - BLOCK 593</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="assets/img/banners/block593_logo.png" alt="BLOCK 593">
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">INICIO</a></li>
                <li><a href="categorias.html" class="nav-link">CATEGORÍAS</a></li>
                <li><a href="productos.html" class="nav-link">PRODUCTOS</a></li>
                <li><a href="contacto.html" class="nav-link">CONTACTO</a></li>
            </ul>
        </div>
    </header>

    <main class="main-contacto">
        <div class="form-wrapper">
            <h1 class="block-title">ÚNETE AL BLOQUE</h1>
            <p class="block-subtitle">PONTE EN CONTACTO CON NOSOTROS Y LLEVA TU ESTILO AL SIGUIENTE NIVEL</p>
            
            <form id="contactForm" novalidate>
                <div class="input-group">
                    <label for="nombre">NOMBRE COMPLETO</label>
                    <input type="text" id="nombre" placeholder="Escribe tu nombre...">
                    <span id="err-nombre" class="error-text"></span>
                </div>

                <div class="input-group">
                    <label for="ciudad">CIUDAD</label>
                    <input type="text" id="ciudad" placeholder="Tu ciudad">
                    <span id="err-ciudad" class="error-text"></span>
                </div>

                <div class="input-group">
                    <label for="email">CORREO ELECTRÓNICO</label>
                    <input type="email" id="email" placeholder="tu@email.com">
                    <span id="err-email" class="error-text"></span>
                </div>

                <div class="input-group">
                    <label for="asunto">ASUNTO</label>
                    <input type="text" id="asunto" placeholder="Motivo">
                    <span id="err-asunto" class="error-text"></span>
                </div>

                <div class="input-group">
                    <label for="descripcion">DESCRIPCIÓN</label>
                    <textarea id="descripcion" placeholder="Mensaje..."></textarea>
                    <span id="err-desc" class="error-text"></span>
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn-primary" style="width: 100%;">CONFIRMAR ENVÍO</button>
                </div>
            </form>
        </div>
    </main>

   <footer>
        <div class="footer-content">
            <img src="assets/img/banners/block593_logo.png" alt="BLOCK 593 Footer Logo" class="logo-footer-img">
            <p>Proyecto Final - Desarrollo Web | Integrantes: Rafael Chiriboga & Julian Amagua</p>
            <p class="copyright">&copy; 2026 BLOCK 593. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
